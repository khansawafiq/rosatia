<!DOCTYPE html>
<!-- Website - www.codingnepalweb.com -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content=" Today in this blog you will learn how to create a responsive Login & Registration Form in HTML CSS & JavaScript. The blog will cover everything from the basics of creating a Login & Registration in HTML, to styling it with CSS and adding with JavaScript." />
    <meta
      name="keywords"
      content=" 
 Animated Login & Registration Form,Form Design,HTML and CSS,HTML CSS JavaScript,login & registration form,login & signup form,Login Form Design,registration form,Signup Form,HTML,CSS,JavaScript,
"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login & Signup Form HTML CSS | CodingNepal</title>
    <link rel="stylesheet" href="style.css" />
    <script src="../custom-scripts.js" defer></script>
  </head>
  <body>
    <section class="wrapper">
      <div class="form signup">
        <header>Daftar</header>
        <form action="#" method="post" id="registerFrom">
          <input type="text" class="form-control" placeholder="Username" id="Ussername"/>
          <input type="text" placeholder="Email" required/>
          <input type="password" placeholder="password"/>
          <div class="checkbox">
            <input type="checkbox" id="signupCheck" />
            <label for="signupCheck">Mengizinkan Data</label>
          </div>
          <input type="submit" value="Daftar"> />
            <p id="message"></p>
        </form>
      </div>

      <div class="form login">
        <header>Masuk</header>
        <form action="#" method="post" id="loginFromMasuk">
          <input type="text" placeholder="Username" required/>
          <input type="Sandi" class="form-control" placeholder="Password" required id="Password"/>
          <a href="#">Lupa sandi?</a>
          <button type="submit">
          <a href="../index.html" style="text-decoration: none; color: inherit;">masuk</a>
          </button>
          <div id="alertBox" class="alert" style="display:none;"></div>
        </form>
      </div>
      

      <script>
        const wrapper = document.querySelector(".wrapper"),
          signupHeader = document.querySelector(".signup header"),
          loginHeader = document.querySelector(".login header");

        loginHeader.addEventListener("click", () => {
          wrapper.classList.add("active");
        });
        signupHeader.addEventListener("click", () => {
          wrapper.classList.remove("active");
        });
      </script>
    </section>
    <p id="message"></p>
    <script src="js/register.js" defer></script>
  </body>
</html>
